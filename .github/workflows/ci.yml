name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — TypeCheck + Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — strict check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  web:
    name: Web — TypeCheck + Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      # Stub values for build-time env validation
      NEXT_PUBLIC_PRIVY_APP_ID: stub_app_id
      NEXT_PUBLIC_CHAIN_ID: '42161'
      NEXT_PUBLIC_GENESIS_API_URL: http://localhost:4000
      NEXT_PUBLIC_GENESIS_VAULT_ADDRESS: '0xb6D0e996d795dCc65Dc21341DAf6FDE991e49abd'
      NEXT_PUBLIC_STRATEGY_ROUTER_ADDRESS: '0xD7ff8383eBBE3B1023d95A3f14c32D9941Ac9e84'
      NEXT_PUBLIC_COMPLIANCE_REGISTRY_ADDRESS: '0x6D58678562387c400964737884E78f2f12e1c495'
      NEXT_PUBLIC_USDC_ADDRESS: '0xaf88d065e77c8cC2239327C5EDb3A432268e5831'
      NEXT_PUBLIC_ALCHEMY_API_KEY: stub
      NEXT_PUBLIC_ZERODEV_PROJECT_ID: stub
      GENESIS_BACKEND_URL: http://localhost:4000
      GENESIS_PARTNER_API_KEY: ci-stub-key
      DATABASE_URL: postgresql://genesis:genesis_dev_password@localhost:5432/genesis_ledger

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript — strict check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
