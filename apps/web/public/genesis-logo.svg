<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0ece4"/>
    </radialGradient>
    <radialGradient id="ringGrad" cx="30%" cy="30%" r="70%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e8c96a"/>
      <stop offset="35%"  stop-color="#c9a84c"/>
      <stop offset="65%"  stop-color="#b8922e"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </radialGradient>
    <radialGradient id="textGrad" cx="40%" cy="30%" r="70%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e8c96a"/>
      <stop offset="50%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a07828"/>
    </radialGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="rgba(180,140,40,0.22)"/>
    </filter>
  </defs>

  <!-- Outer white circle background -->
  <circle cx="256" cy="256" r="252" fill="url(#bgGrad)" filter="url(#softShadow)"/>

  <!-- Gold ring — outer edge -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#ringGrad)" stroke-width="38"/>

  <!-- Gold ring — inner highlight line -->
  <circle cx="256" cy="256" r="221" fill="none" stroke="rgba(232,201,106,0.28)" stroke-width="1.2"/>

  <!-- GR lettermark -->
  <text
    x="256"
    y="304"
    font-family="'Georgia', 'Palatino Linotype', 'Book Antiqua', serif"
    font-size="172"
    font-weight="700"
    fill="url(#textGrad)"
    text-anchor="middle"
    letter-spacing="6"
  >GR</text>
</svg>
