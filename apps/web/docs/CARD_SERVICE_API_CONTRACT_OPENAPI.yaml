          enum:
            - card.issued
            - card.shipped
            - card.activated
            - card.frozen
            - card.unfrozen
            - card.authorization.approved
            - card.authorization.declined
            - card.clearing.posted
            - funding.requires_action
            - funding.captured
            - funding.settled
            - funding.failed
            - payout.paid
            - payout.failed
            - payout.returned
            - dispute.opened
            - dispute.closed
        createdAt:
          type: string
          format: date-time
        accountId:
          type: string
        cardId:
          type: string
          nullable: true
        fundingId:
          type: string
          nullable: true
        payoutId:
          type: string
          nullable: true
        disputeId:
          type: string
          nullable: true
        data:
          type: object
          additionalProperties: true

x-contract-notes:
  mutation_idempotency:
    - All POST/PATCH mutations require idempotency-key.
    - Card issuance (POST /v1/cards) idempotency key retention minimum is 7 days.
    - All other mutation key retention minimum is 24 hours.
  webhook_security:
    - Validate x-webhook-signature using shared secret and timestamp tolerance.
    - Reject duplicates by webhook event id.
    - Retry schedule for non-2xx deliveries: 1m, 5m, 30m, 2h, 24h.
    - After max retries, mark event dead-lettered and require recovery via GET
      /v1/webhooks/events.
  pci_scope:
    - No raw PAN/CVV in any request payload.
    - Linking must use hosted-field token (processorSetupToken).
  ledger_rules:
    - Funding and payout statuses must mirror ledger state transitions.
    - Auth hold and cleared settlement must be represented as separate ledger
      events.
  x-state-machine:
    card_status:
      - requested -> pending_kyc -> active
      - requested -> pending_fulfillment -> active
      - active -> frozen -> active
      - active -> canceled (terminal)
      - frozen -> canceled (terminal)
      - any -> blocked (compliance-triggered)
  rate_limit_headers:
    - X-RateLimit-Limit
    - X-RateLimit-Remaining
    - Retry-After
