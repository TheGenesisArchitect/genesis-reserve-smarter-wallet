          type: string
          format: date-time

    CreateCardRequest:
      type: object
      required: [ accountId, cardholderId, type ]
      properties:
        accountId:
          type: string
        cardholderId:
          type: string
        type:
          $ref: "#/components/schemas/CardType"
        brand:
          type: string
          enum: [ visa, mastercard ]
        spendLimitPreset:
          type: integer
          enum: [ 500, 1000, 5000, 25000 ]
