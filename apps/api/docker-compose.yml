version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: genesis_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: genesis
      POSTGRES_PASSWORD: genesis_dev_password
      POSTGRES_DB: genesis_ledger
    ports:
      - "5432:5432"
    volumes:
      - genesis_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genesis -d genesis_ledger"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: genesis_redis
    restart: unless-stopped
    command: redis-server --requirepass genesis_dev_redis
    ports:
      - "6379:6379"

volumes:
  genesis_db_data:
    name: genesis_db_data
